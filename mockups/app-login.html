<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0A84FF">
<title>Entrar — CrossFit SP</title>
<meta name="description" content="Acesse o app da CrossFit SP.">
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #0A84FF; --primary-dark: #005396; --primary-50: #eff6ff;
    --paper: #faf8f5; --paper-2: #f3efe8;
    --ink-900: #0c0a09; --ink-700: #292524; --ink-500: #57534e; --ink-400: #78716c; --ink-300: #a8a29e;
    --line: #e7e2d9;
    --font-display: "Outfit", system-ui, sans-serif;
    --font-body: "Geist", system-ui, sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-body); background: #f1f5f9; display: flex; align-items: center; justify-content: center; min-height: 100dvh; padding: 2rem; -webkit-font-smoothing: antialiased; }

  .phone {
    width: 390px; background: #fff; border-radius: 44px;
    box-shadow: 0 50px 100px rgba(0,0,0,0.18), inset 0 0 0 2px #e5e7eb;
    overflow: hidden; position: relative; min-height: 800px;
    display: flex; flex-direction: column;
  }

  .status-bar { background: var(--primary); padding: 0.55rem 1.5rem 0.3rem; display: flex; justify-content: space-between; align-items: center; font-size: 0.7rem; font-weight: 600; color: rgba(255,255,255,0.92); }

  .top-section {
    background: var(--primary); color: #fff;
    padding: 4rem 2rem 5rem;
    text-align: center;
    position: relative; overflow: hidden;
  }
  .top-section::after {
    content: ""; position: absolute;
    width: 280px; height: 280px; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.16) 0%, transparent 70%);
    bottom: -120px; right: -100px; pointer-events: none;
  }
  .academy-logo {
    width: 80px; height: 80px; border-radius: 24px;
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.25);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 1.5rem;
    font-family: var(--font-display); font-weight: 700; font-size: 1.7rem;
    color: #fff;
    position: relative; z-index: 1;
  }
  .academy-name {
    font-family: var(--font-display); font-weight: 600;
    font-size: 1.7rem; letter-spacing: -0.025em; position: relative; z-index: 1;
  }
  .academy-tagline {
    font-size: 0.85rem; opacity: 0.8; margin-top: 0.5rem;
    position: relative; z-index: 1;
  }

  .form-section {
    background: var(--paper);
    border-radius: 32px 32px 0 0;
    margin-top: -28px; padding: 2.25rem 1.5rem 2rem;
    flex: 1;
    display: flex; flex-direction: column;
  }

  .welcome {
    font-family: var(--font-display); font-size: 1.4rem; font-weight: 600;
    letter-spacing: -0.02em; line-height: 1.15;
    margin-bottom: 0.4rem;
  }
  .welcome-sub { font-size: 0.85rem; color: var(--ink-500); margin-bottom: 1.75rem; }

  .field { margin-bottom: 1rem; }
  .field label {
    display: block; font-size: 0.78rem; font-weight: 500;
    color: var(--ink-700); margin-bottom: 0.45rem;
  }
  .field input {
    width: 100%; padding: 0.95rem 1rem;
    background: #fff; border: 1px solid var(--line); border-radius: 12px;
    font-size: 0.95rem; color: var(--ink-900);
    font-family: var(--font-body);
  }
  .field input:focus {
    outline: none; border-color: var(--primary);
    box-shadow: 0 0 0 4px var(--primary-50);
  }

  .form-extras {
    display: flex; align-items: center; justify-content: space-between;
    margin: 0.5rem 0 1.5rem; font-size: 0.82rem;
  }
  .checkbox { display: flex; align-items: center; gap: 0.45rem; color: var(--ink-700); cursor: pointer; }
  .checkbox input { width: 16px; height: 16px; accent-color: var(--primary); }
  .forgot { color: var(--primary); font-weight: 500; text-decoration: none; }

  .btn-primary {
    width: 100%; padding: 1rem;
    background: var(--primary); color: #fff;
    border: none; border-radius: 14px;
    font-family: var(--font-body); font-weight: 600; font-size: 0.95rem;
    cursor: pointer; transition: background 0.18s, transform 0.18s;
    box-shadow: 0 8px 20px -8px rgba(239,68,68,0.5);
  }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-primary:active { transform: translateY(1px); }

  .biometric {
    margin-top: 1rem;
    display: flex; align-items: center; justify-content: center; gap: 0.6rem;
    padding: 0.95rem; background: #fff;
    border: 1px solid var(--line); border-radius: 14px;
    color: var(--ink-700); font-weight: 500; font-size: 0.88rem;
    cursor: pointer; width: 100%;
    font-family: var(--font-body);
  }
  .biometric:hover { border-color: var(--primary); color: var(--primary); }
  .biometric svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }

  .footer {
    margin-top: auto; padding-top: 1.5rem;
    text-align: center; font-size: 0.78rem; color: var(--ink-400);
  }
  .footer a { color: var(--ink-700); font-weight: 500; }

  .powered {
    margin-top: 1rem; padding-top: 1rem;
    border-top: 1px solid var(--line);
    font-size: 0.68rem; color: var(--ink-300);
    font-family: monospace; letter-spacing: 0.04em;
  }

/* ========== MOBILE RESPONSIVE ========== */

/* Hamburger button (hidden on desktop) */
.hamburger {
  display: none; flex-direction: column; gap: 5px; cursor: pointer;
  padding: 0.4rem; border: none; background: transparent;
}
.hamburger span { display: block; width: 22px; height: 2px; background: #1e1b4b; border-radius: 2px; transition: all 0.3s; }
.sidebar-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  z-index: 99; backdrop-filter: blur(2px);
}

@media (max-width: 768px) {

  /* ── Admin layout ── */
  body { flex-direction: column; height: auto; overflow: auto; }

  .hamburger { display: flex; }

  .sidebar {
    position: fixed; left: -260px; top: 0; bottom: 0; z-index: 100;
    width: 240px; transition: left 0.3s ease; height: 100vh;
  }
  .sidebar.open { left: 0; }
  .sidebar-overlay.visible { display: block; }

  .main { width: 100%; min-height: 100vh; overflow: auto; }

  .topbar {
    padding: 0 1rem; gap: 0.5rem; position: sticky; top: 0; z-index: 50;
  }
  .topbar-search { display: none; }
  .topbar-title { font-size: 0.9rem; }

  .content { padding: 1rem; overflow: visible; }

  /* Metric grids → 2 columns */
  .metrics-grid { grid-template-columns: repeat(2, 1fr); }
  .grid-2col { grid-template-columns: 1fr; }
  .features-grid { grid-template-columns: 1fr 1fr; }
  .dre-hero { grid-template-columns: 1fr; }
  .pricing-grid { grid-template-columns: 1fr; }
  .steps { flex-direction: column; gap: 1.5rem; }
  .step:not(:last-child)::after { content: '↓'; top: auto; bottom: -1.2rem; right: 50%; transform: translateX(50%); font-size: 1.2rem; }
  .family-grid { grid-template-columns: 1fr; }
  .workout-grid { grid-template-columns: 1fr; }

  /* Tables → hide less important cols */
  table thead tr th:nth-child(4),
  table thead tr th:nth-child(5),
  table tbody tr td:nth-child(4),
  table tbody tr td:nth-child(5) { display: none; }

  .mockup-frame { display: none; }

  /* Landing nav */
  .nav-links { display: none; }

  /* Hero text */
  .hero { padding: 6rem 1.25rem 3rem; }
  .hero-ctas { flex-direction: column; align-items: center; }
  .hero-ctas .btn-primary,
  .hero-ctas .btn-outline { width: 100%; max-width: 300px; text-align: center; }
}

@media (max-width: 480px) {
  .metrics-grid { grid-template-columns: 1fr 1fr; }
  .features-grid { grid-template-columns: 1fr; }
  .hero h1 { font-size: 2rem; }
  .section-title { font-size: 1.5rem; }
  .pricing-grid { grid-template-columns: 1fr; }
  .dre-hero { grid-template-columns: 1fr; }
  .dre-card-value { font-size: 1.5rem; }
}


@media (max-width: 430px) {
  body { padding: 0; background: #fff; align-items: flex-start; }
  .phone { width: 100%; border-radius: 0; box-shadow: none; min-height: 100vh; }
}


/* ========== MOBILE FIX (overrides desktop layout) ========== */
@media (max-width: 768px) {
  /* Reset the desktop "full viewport" lock */
  html, body {
    height: auto !important;
    overflow: auto !important;
    overflow-x: hidden !important;
  }
  body {
    display: block !important;
  }
  /* Sidebar becomes fixed drawer */
  .sidebar {
    position: fixed !important;
    left: -260px !important;
    top: 0 !important; bottom: 0 !important;
    width: 240px !important;
    height: 100vh !important;
    z-index: 200 !important;
    transition: left 0.28s cubic-bezier(.4,0,.2,1) !important;
    overflow-y: auto !important;
  }
  .sidebar.open { left: 0 !important; }
  .sidebar-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 199;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(2px);
  }
  .sidebar-overlay.visible { display: block !important; }

  /* Main area fills full screen */
  .main {
    width: 100% !important;
    height: auto !important;
    overflow: visible !important;
    display: flex !important;
    flex-direction: column !important;
  }
  /* Topbar stays sticky at top */
  .topbar {
    position: sticky !important;
    top: 0 !important;
    z-index: 100 !important;
    padding: 0 1rem !important;
    gap: 0.5rem !important;
  }
  .topbar-search { display: none !important; }

  /* Content scrolls naturally */
  .content {
    flex: none !important;
    overflow: visible !important;
    padding: 1rem !important;
    min-height: calc(100vh - 60px) !important;
  }

  /* Hamburger visible */
  .hamburger { display: flex !important; }

  /* Grids → single or 2 columns */
  .metrics-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 0.75rem !important; }
  .grid-2col { grid-template-columns: 1fr !important; }
  .features-grid { grid-template-columns: 1fr 1fr !important; }
  .dre-hero { grid-template-columns: 1fr !important; }
  .pricing-grid { grid-template-columns: 1fr !important; }
  .family-grid { grid-template-columns: 1fr !important; }
  .workout-grid { grid-template-columns: 1fr !important; }
  .steps { flex-direction: column !important; gap: 1.5rem !important; }
  .step:not(:last-child)::after {
    content: '↓' !important;
    top: auto !important; bottom: -1.2rem !important;
    right: 50% !important; transform: translateX(50%) !important;
  }

  /* Hide non-essential table columns */
  table th:nth-child(n+4),
  table td:nth-child(n+4) { display: none !important; }

  /* Hide desktop mockup inside hero */
  .mockup-frame { display: none !important; }

  /* landing nav links hidden */
  .nav-links { display: none !important; }

  /* Hero adjustments */
  .hero { padding: 6rem 1.25rem 3rem !important; }
  .hero h1 { font-size: 2.2rem !important; }
  .hero-ctas { flex-direction: column !important; align-items: center !important; }
  .hero-ctas a, .hero-ctas button { width: 100% !important; max-width: 300px !important; text-align: center !important; }

  /* Topbar title size */
  .topbar-title { font-size: 0.92rem !important; }
  .btn-add { font-size: 0.8rem !important; padding: 0.45rem 0.75rem !important; }

  /* Table horizontal scroll */
  .table-card, .table-responsive { overflow-x: auto !important; }
  table { min-width: 400px !important; }
}

@media (max-width: 480px) {
  .metrics-grid { grid-template-columns: 1fr 1fr !important; }
  .features-grid { grid-template-columns: 1fr !important; }
  .hero h1 { font-size: 1.8rem !important; }
  .dre-card-value { font-size: 1.5rem !important; }
  .plan-price { font-size: 2rem !important; }
  table th:nth-child(n+3),
  table td:nth-child(n+3) { display: none !important; }
}

@media (max-width: 480px) {
  body { padding: 0 !important; background: #fff !important; align-items: flex-start !important; justify-content: flex-start !important; min-height: 100vh !important; }
  .phone { width: 100% !important; min-width: 100vw !important; border-radius: 0 !important; box-shadow: none !important; min-height: 100vh !important; }
}

/* ===== END MOBILE FIX ===== */
</style>
</head>
<body>

<div class="phone">

  <div class="status-bar"><span>9:41</span><span>●●●●● WiFi</span></div>

  <section class="top-section">
    <div class="academy-logo">CFS</div>
    <div class="academy-name">CrossFit SP</div>
    <div class="academy-tagline">Unidade Vila Mariana</div>
  </section>

  <main class="form-section">
    <h1 class="welcome">Bem-vindo de volta.</h1>
    <p class="welcome-sub">Acesse o app da sua academia.</p>

    <form>
      <div class="field">
        <label for="email">E-mail</label>
        <input id="email" type="email" placeholder="voce@email.com" autocomplete="email">
      </div>
      <div class="field">
        <label for="pw">Senha</label>
        <input id="pw" type="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <div class="form-extras">
        <label class="checkbox"><input type="checkbox" checked> Manter conectado</label>
        <a href="#" class="forgot">Esqueci a senha</a>
      </div>
      <button type="submit" class="btn-primary">Entrar</button>
      <button type="button" class="biometric">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M12 14c-3.5 0-6 1-7 4M4 22c0-2 1-4 3-5M20 22c0-2-1-4-3-5"/></svg>
        Entrar com Face ID
      </button>
    </form>

    <div class="footer">
      <span>Não é aluno ainda? <a href="#">Conheça a CrossFit SP</a></span>
      <div class="powered">POWERED BY GYM</div>
    </div>
  </main>
</div>

</body>
</html>
